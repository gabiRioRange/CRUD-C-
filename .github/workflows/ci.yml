name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CRUD-Project.sln

      - name: Build
        run: dotnet build CRUD-Project.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CRUD-Project.sln --configuration Release --no-build --verbosity normal
